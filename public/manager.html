<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ағарту — Бөлімбас</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen text-white">
  <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
    <div>
      <span class="text-purple-400 font-bold text-lg">Ағарту</span>
      <span class="text-gray-500 mx-2">|</span>
      <span class="text-gray-300 text-sm">Бөлімбас кабинеті</span>
    </div>
    <button onclick="logout()" class="text-gray-500 hover:text-white text-sm transition">Шығу</button>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="flex gap-2 mb-5 flex-wrap">
      <button onclick="tab('tasks')"     id="tb-tasks"     class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium transition">Тапсырмалар</button>
      <button onclick="tab('attend')"    id="tb-attend"    class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition">Қадағалау</button>
      <button onclick="tab('reports')"   id="tb-reports"   class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition">Отчеттер</button>
      <button onclick="tab('employees')" id="tb-employees" class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition">Қызметкерлер</button>
    </div>

    <!-- Тапсырмалар -->
    <div id="pn-tasks">
      <div class="bg-gray-800 rounded-xl p-5 mb-4">
        <h2 class="font-semibold mb-4">Тапсырма беру</h2>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <input id="t-title" type="text" placeholder="Тапсырма атауы"
            class="bg-gray-700 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-500">
          <select id="t-emp" class="bg-gray-700 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-500">
            <option value="">Қызметкер таңдаңыз</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-3">
          <select id="t-type" class="bg-gray-700 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-500">
            <option value="daily">Күндік тапсырма</option>
            <option value="weekly">Апталық тапсырма</option>
          </select>
          <input id="t-date" type="date"
            class="bg-gray-700 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-500">
        </div>
        <div class="flex gap-3">
          <textarea id="t-desc" rows="2" placeholder="Сипаттама"
            class="flex-1 bg-gray-700 rounded-lg px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-500 resize-none"></textarea>
          <button onclick="createTask()"
            class="bg-purple-600 hover:bg-purple-500 px-6 rounded-lg text-sm font-medium transition self-stretch">Беру</button>
        </div>
      </div>

      <div class="bg-gray-800 rounded-xl p-5">
        <h2 class="font-semibold mb-4">Барлық тапсырмалар</h2>
        <div class="grid grid-cols-3 gap-3">
          <div class="bg-gray-700/60 rounded-lg p-3">
            <div class="text-yellow-400 font-medium text-sm mb-3">ТЗ</div>
            <div id="m-todo" class="space-y-2 min-h-16"></div>
          </div>
          <div class="bg-gray-700/60 rounded-lg p-3">
            <div class="text-blue-400 font-medium text-sm mb-3">Процесс</div>
            <div id="m-process" class="space-y-2 min-h-16"></div>
          </div>
          <div class="bg-gray-700/60 rounded-lg p-3">
            <div class="text-green-400 font-medium text-sm mb-3">Дайын</div>
            <div id="m-done" class="space-y-2 min-h-16"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Қадағалау -->
    <div id="pn-attend" class="hidden">
      <div class="bg-gray-800 rounded-xl p-5">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-semibold">Бүгінгі қатысу</h2>
          <input type="date" id="att-date" onchange="loadAtt()"
            class="bg-gray-700 rounded-lg px-3 py-2 text-sm outline-none">
        </div>
        <div id="att-list" class="space-y-2"></div>
      </div>
    </div>

    <!-- Отчеттер -->
    <div id="pn-reports" class="hidden">
      <div class="bg-gray-800 rounded-xl p-5">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-semibold">Күндік отчеттер</h2>
          <input type="date" id="rep-date" onchange="loadReps()"
            class="bg-gray-700 rounded-lg px-3 py-2 text-sm outline-none">
        </div>
        <div id="rep-list" class="space-y-3"></div>
      </div>
    </div>

    <!-- Қызметкерлер -->
    <div id="pn-employees" class="hidden">
      <div class="bg-gray-800 rounded-xl p-5">
        <h2 class="font-semibold mb-4">Қызметкерлер тізімі</h2>
        <div id="emp-list" class="space-y-2"></div>
      </div>
    </div>
  </main>

  <style>
    .tab-btn { background: rgb(55 65 81); color: rgb(156 163 175); }
    .tab-btn.active { background: rgb(147 51 234); color: white; }
  </style>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    const h = { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    const api = (url, opt = {}) => fetch(url, { ...opt, headers: { ...h, ...opt.headers } });
    const TODAY = new Date().toISOString().slice(0, 10);

    function logout() { localStorage.clear(); window.location.href = '/'; }

    function tab(name) {
      ['tasks','attend','reports','employees'].forEach(t => {
        document.getElementById(`tb-${t}`).classList.remove('active');
        document.getElementById(`pn-${t}`).classList.add('hidden');
      });
      document.getElementById(`tb-${name}`).classList.add('active');
      document.getElementById(`pn-${name}`).classList.remove('hidden');
      if (name === 'attend') loadAtt();
      if (name === 'reports') loadReps();
      if (name === 'employees') loadEmps();
    }

    async function loadUsers() {
      const r = await api('/api/users');
      const users = await r.json();
      const sel = document.getElementById('t-emp');
      users.filter(u => u.role === 'employee').forEach(u => {
        const o = document.createElement('option');
        o.value = u.id;
        o.textContent = `${u.first_name} ${u.last_name}`;
        sel.appendChild(o);
      });
      return users;
    }

    async function createTask() {
      const title = document.getElementById('t-title').value.trim();
      if (!title) return alert('Тақырып енгізіңіз');
      const body = {
        title,
        description:  document.getElementById('t-desc').value,
        assigned_to:  document.getElementById('t-emp').value || null,
        due_date:     document.getElementById('t-date').value,
        type:         document.getElementById('t-type').value
      };
      const r = await api('/api/tasks', { method: 'POST', body: JSON.stringify(body) });
      if (!r.ok) { const d = await r.json(); return alert(d.error); }
      document.getElementById('t-title').value = '';
      document.getElementById('t-desc').value = '';
      loadTasks();
    }

    function tcard(t) {
      return `<div class="bg-gray-600 rounded-lg p-3 text-sm">
        <div class="font-medium mb-1">${t.title}
          ${t.type === 'weekly' ? '<span class="text-xs text-purple-300 bg-purple-900 px-1.5 py-0.5 rounded ml-1">апт</span>' : ''}
        </div>
        ${t.assigned_to_name ? `<div class="text-xs text-gray-400">👤 ${t.assigned_to_name}</div>` : ''}
        ${t.due_date ? `<div class="text-xs text-gray-500">📅 ${t.due_date}</div>` : ''}
      </div>`;
    }

    async function loadTasks() {
      const r = await api('/api/tasks');
      const tasks = await r.json();
      ['todo','process','done'].forEach(s => {
        const f = tasks.filter(t => t.status === s);
        document.getElementById(`m-${s}`).innerHTML = f.length
          ? f.map(tcard).join('')
          : '<div class="text-center text-gray-600 text-xs py-4">Бос</div>';
      });
    }

    async function loadAtt() {
      const date = document.getElementById('att-date').value || TODAY;
      const r = await api(`/api/attendance/all?date=${date}`);
      const rows = await r.json();
      const el = document.getElementById('att-list');
      if (!rows.length) { el.innerHTML = '<div class="text-gray-500 text-center py-6">Деректер жоқ</div>'; return; }
      el.innerHTML = rows.map(a => {
        const ci = a.check_in ? new Date(a.check_in).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '—';
        const co = a.check_out ? new Date(a.check_out).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '—';
        const geo = a.check_in_lat
          ? `<a href="https://maps.google.com/?q=${a.check_in_lat},${a.check_in_lon}" target="_blank" class="text-blue-400 text-xs hover:underline ml-2">📍 Геолокация</a>` : '';
        const status = a.check_out ? '🔴 Кетті' : a.check_in ? '🟢 Жұмыста' : '⚫ Жоқ';
        return `<div class="bg-gray-700 rounded-lg px-4 py-3 flex justify-between items-center">
          <div>
            <div class="font-medium text-sm">${a.name}</div>
            <div class="text-xs text-gray-400 mt-0.5">Келу: ${ci} &nbsp;|&nbsp; Кету: ${co}${geo}</div>
          </div>
          <span class="text-sm">${status}</span>
        </div>`;
      }).join('');
    }

    async function loadReps() {
      const date = document.getElementById('rep-date').value || TODAY;
      const r = await api(`/api/reports/all?date=${date}`);
      const rows = await r.json();
      const el = document.getElementById('rep-list');
      if (!rows.length) { el.innerHTML = '<div class="text-gray-500 text-center py-6">Отчет жоқ</div>'; return; }
      el.innerHTML = rows.map(rep => `
        <div class="bg-gray-700 rounded-lg p-4">
          <div class="flex justify-between text-sm mb-2">
            <span class="font-medium">${rep.name}</span>
            <span class="text-gray-500 text-xs">${new Date(rep.created_at).toLocaleString('ru-RU')}</span>
          </div>
          <p class="text-gray-300 text-sm leading-relaxed">${rep.content}</p>
        </div>`).join('');
    }

    async function loadEmps() {
      const r = await api('/api/users');
      const users = await r.json();
      document.getElementById('emp-list').innerHTML = users.map(u => {
        const roleLabel = { director: 'Директор', manager: 'Бөлімбас', employee: 'Қызметкер' }[u.role];
        const roleColor = { director: 'bg-yellow-900 text-yellow-300', manager: 'bg-purple-900 text-purple-300', employee: 'bg-gray-600 text-gray-300' }[u.role];
        return `<div class="bg-gray-700 rounded-lg px-4 py-3 flex justify-between items-center">
          <div>
            <div class="font-medium text-sm">${u.first_name} ${u.last_name}</div>
            <div class="text-xs text-gray-400">${u.phone}</div>
          </div>
          <span class="text-xs px-2 py-1 rounded-full ${roleColor}">${roleLabel}</span>
        </div>`;
      }).join('');
    }

    document.getElementById('att-date').value = TODAY;
    document.getElementById('rep-date').value = TODAY;
    document.getElementById('t-date').value = TODAY;
    loadUsers();
    loadTasks();
  </script>
</body>
</html>
